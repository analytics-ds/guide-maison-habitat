baseURL = "https://guide-maison-habitat.com/"
title = "Guide Maison & Habitat"
theme = "guide-maison-habitat"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

enableRobotsTXT = false
enableGitInfo = false

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Français"
    weight = 1
    contentDir = "content"
    title = "Guide Maison & Habitat"
    [languages.fr.params]
      description = "Guide Maison & Habitat : achat, vente, location, financement, assurance, aménagement et travaux. L'expertise immobilière à portée de main."

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 2
    contentDir = "content/en"
    title = "Guide Maison & Habitat"
    [languages.en.params]
      description = "Guide Maison & Habitat: buying, selling, renting, financing, insurance, interior design and renovation. Real estate expertise at your fingertips."

[taxonomies]
  category = "categories"
  tag = "tags"

# Menu FR — 100% immobilier, flat navigation
[[languages.fr.menus.main]]
  identifier = "achat"
  name = "Achat"
  url = "/categories/achat/"
  weight = 1
[[languages.fr.menus.main]]
  identifier = "vente"
  name = "Vente"
  url = "/categories/vente/"
  weight = 2
[[languages.fr.menus.main]]
  identifier = "location"
  name = "Location"
  url = "/categories/location/"
  weight = 3
[[languages.fr.menus.main]]
  identifier = "financement"
  name = "Financement"
  url = "/categories/financement/"
  weight = 4
[[languages.fr.menus.main]]
  identifier = "assurance"
  name = "Assurance"
  url = "/categories/assurance/"
  weight = 5
[[languages.fr.menus.main]]
  identifier = "amenagement"
  name = "Aménagement & Décoration"
  url = "/categories/amenagement-et-decoration/"
  weight = 6
[[languages.fr.menus.main]]
  identifier = "travaux"
  name = "Travaux & Rénovation"
  url = "/categories/travaux-et-renovation/"
  weight = 7
[[languages.fr.menus.main]]
  identifier = "blog"
  name = "Blog"
  url = "/blog/"
  weight = 99

# Menu EN
[[languages.en.menus.main]]
  identifier = "buying"
  name = "Buying"
  url = "/en/categories/buying/"
  weight = 1
[[languages.en.menus.main]]
  identifier = "selling"
  name = "Selling"
  url = "/en/categories/selling/"
  weight = 2
[[languages.en.menus.main]]
  identifier = "rental"
  name = "Rental"
  url = "/en/categories/rental/"
  weight = 3
[[languages.en.menus.main]]
  identifier = "financing"
  name = "Financing"
  url = "/en/categories/financing/"
  weight = 4
[[languages.en.menus.main]]
  identifier = "insurance"
  name = "Insurance"
  url = "/en/categories/insurance/"
  weight = 5
[[languages.en.menus.main]]
  identifier = "interior"
  name = "Interior Design & Decor"
  url = "/en/categories/interior-design-and-decor/"
  weight = 6
[[languages.en.menus.main]]
  identifier = "renovation"
  name = "Renovation"
  url = "/en/categories/renovation/"
