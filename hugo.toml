[params]
  # Palette premium : noir profond + ivoire + accent bronze
  primary = "#1B1B1B"
  primaryLight = "#404040"
  background = "#FAF7F2"
  backgroundAlt = "#F0ECE3"
  accent = "#B08968"
  cta = "#1B1B1B"
  ctaHover = "#404040"
  text = "#2B2B2B"
  textLight = "#6B6B6B"
  border = "#E5DFD2"
  fontHeading = "Cormorant Garamond"
  fontBody = "Inter"
  fontUI = "Inter"
  default_og_image = "/images/og-default.jpg"
  logo = "/logo.svg"
  founding_year = "2026"
  expertise = ["Achat immobilier", "Vente immobilière", "Location", "Financement", "Assurance habitation", "Aménagement intérieur", "Rénovation"]
  og_locale_alternate = "en_US"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = true

[related]
  includeNewer = true
  threshold = 80
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80

[minify]
  disableXML = true
