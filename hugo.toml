baseURL = "https://guide-maison-habitat.com/"
title = "Guide Maison & Habitat"
theme = "guide-maison-habitat"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

enableRobotsTXT = false
enableGitInfo = false

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Français"
    weight = 1
    contentDir = "content"
    title = "Guide Maison & Habitat"
    [languages.fr.params]
      description = "Guide Maison & Habitat : immobilier, investissement, où vivre, travaux, déco et jardin. Conseils d'experts, comparatifs et guides pratiques."

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 2
    contentDir = "content/en"
    title = "Guide Maison & Habitat"
    [languages.en.params]
      description = "Guide Maison & Habitat: real estate, investment, where to live, renovation, decor and garden. Expert advice, comparisons and practical guides."

[taxonomies]
  category = "categories"
  tag = "tags"

# Menu FR — priorité immobilier, maison en regroupement
[[languages.fr.menus.main]]
  identifier = "immobilier"
  name = "Immobilier"
  url = "/categories/immobilier/"
  weight = 1
[[languages.fr.menus.main]]
  identifier = "investissement"
  name = "Investissement"
  url = "/categories/investissement-immobilier/"
  weight = 2
[[languages.fr.menus.main]]
  identifier = "ou-vivre"
  name = "Où vivre"
  url = "/categories/ou-vivre/"
  weight = 3
[[languages.fr.menus.main]]
  identifier = "maison"
  name = "Maison"
  url = "/maison/"
  weight = 4
  [[languages.fr.menus.main]]
    parent = "maison"
    name = "Aménagement intérieur"
    url = "/categories/amenagement-interieur/"
    weight = 1
  [[languages.fr.menus.main]]
    parent = "maison"
    name = "Travaux & rénovation"
    url = "/categories/travaux-et-renovation/"
    weight = 2
  [[languages.fr.menus.main]]
    parent = "maison"
    name = "Décoration"
    url = "/categories/decoration/"
    weight = 3
  [[languages.fr.menus.main]]
    parent = "maison"
    name = "Jardin"
    url = "/categories/jardin/"
    weight = 4
[[languages.fr.menus.main]]
  identifier = "blog"
  name = "Le Blog"
  url = "/blog/"
  weight = 99

# Menu EN
[[languages.en.menus.main]]
  identifier = "real-estate"
  name = "Real estate"
  url = "/en/categories/real-estate/"
  weight = 1
[[languages.en.menus.main]]
  identifier = "investment"
  name = "Investment"
  url = "/en/categories/real-estate-investment/"
  weight = 2
[[languages.en.menus.main]]
  identifier = "where-to-live"
  name = "Where to live"
  url = "/en/categories/where-to-live/"
  weight = 3
[[languages.en.menus.main]]
  identifier = "home"
  name = "Home & Garden"
  url = "/en/home-garden/"
  weight = 4
  [[languages.en.menus.main]]
    parent = "home"
    name = "Interior design"
    url = "/en/categories/interior-design/"
    weight = 1
  [[languages.en.menus.main]]
    parent = "home"
    name = "Renovation"
    url = "/en/categories/renovation-and-works/"
    weight = 2
  [[languages.en.menus.main]]
    parent = "home"
    name = "Decoration"
    url = "/en/categories/decoration/"
    weight = 3
  [[languages.en.menus.main]]
    parent = "home"
    name = "Garden"
    url = "/en/categories/garden/"
    weight = 4
[[languages.en.menus.main]]
  identifier = "blog"
  name = "The Blog"
  url = "/en/blog/"
  weight = 99

[params]
  primary = "#3D4A2A"
  primaryLight = "#5A6B45"
  background = "#F4EFE3"
  backgroundAlt = "#E8E2D0"
  accent = "#3D4A2A"
  cta = "#3D4A2A"
  ctaHover = "#2A3419"
  text = "#1A1A14"
  textLight = "#5A5A52"
  border = "#D6CFBA"
  fontHeading = "Fraunces"
  fontBody = "Inter"
  fontUI = "Inter"
  default_og_image = "/images/og-default.jpg"
  logo = "/logo.svg"
  founding_year = "2026"
  expertise = ["Immobilier", "Investissement immobilier", "Où vivre", "Aménagement intérieur", "Rénovation", "Décoration", "Jardin"]
  og_locale_alternate = "en_US"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = true

[related]
  includeNewer = true
  threshold = 80
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80

# Desactiver la minification XML pour avoir un sitemap lisible
[minify]
  disableXML = true

