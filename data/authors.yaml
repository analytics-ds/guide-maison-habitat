# Auteurs du blog — multilingue FR/EN
# Ce fichier est copie dans `data/authors.yaml` a la racine du site Hugo a la creation du site.
# Hugo le lit nativement via `.Site.Data.authors` dans les templates.
#
# Structure : map d'auteurs indexee par ID (slug)
# L'ID est utilise dans le frontmatter des articles comme `author: thomas-durand`
#
# Le champ `topics` sert a la selection automatique de l'auteur dans /create-article.
# Le champ `expertise` alimente le schema.org Person -> knowsAbout.

thomas-durand:
  id: thomas-durand
  name: Thomas Durand
  type: person
  avatar: /images/authors/thomas-durand.jpg
  linkedinUrl: ""
  jobTitle:
    fr: Rédacteur en chef & analyste tech
    en: Editor-in-Chief & tech analyst
  role:
    fr: Rédacteur en chef & analyste tech
    en: Editor-in-Chief & tech analyst
  bio:
    fr: "Thomas Durand est rédacteur en chef. Passionné de technologie, il teste et compare les solutions numeriques pour aider les professionnels et particuliers a faire les bons choix."
    en: "Thomas Durand is Editor-in-Chief. Passionate about technology, he tests and compares digital solutions to help professionals and individuals make the right choices."
  expertise:
    - SaaS
    - Cloud Computing
    - Cybersécurité
    - Outils de productivité
    - Intelligence artificielle
    - Matériel informatique
  topics:
    - tech
    - technologie
    - saas
    - logiciel
    - cloud
    - cybersécurité
    - sécurité informatique
    - ia
    - intelligence artificielle
    - productivité
    - outils pro
    - b2b
    - informatique
    - hardware

