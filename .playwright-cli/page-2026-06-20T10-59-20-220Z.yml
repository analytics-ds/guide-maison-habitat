            - blockquote [ref=e105]:
              - paragraph [ref=e106]:
                - strong [ref=e107]: "En bref :"
              - list [ref=e108]:
                - listitem [ref=e109]:
                  - text: Le meilleur brasero en 2026 dans ce classement est le
                  - strong [ref=e110]: COEO TRIO
                  - text: ", seul modèle réellement 3-en-1 (brasero d’ambiance, plancha et grille barbecue), avec une plancha en acier de 10 mm conforme au contact alimentaire, en acier Corten ou galvanisé thermolaqué noir. Le TRIO Ø82 cm est affiché à 1 180 euros, le TRIO Ø98 cm à 1 350 euros."
                - listitem [ref=e111]:
                  - text: Derrière, l’
                  - strong [ref=e112]: Ofyr Classic 85
                  - text: (environ 2 400 euros) reste la référence design en Corten,
                  - strong [ref=e113]: L’Atelier Braséro 850
                  - text: (environ 1 730 euros) et le
                  - strong [ref=e114]: Höfats Triple
                  - text: (environ 990 euros) complètent le haut et le milieu de gamme.
                - listitem [ref=e115]:
                  - text: Pour les budgets serrés, le
                  - strong [ref=e116]: Barbecook Nestor
                  - text: (environ 899 euros) et le
                  - strong [ref=e117]: Le Marquier Mendia
                  - text: (environ 890 euros) offrent le meilleur rapport qualité-prix, devant le
                  - strong [ref=e118]: Kibrule
                  - text: (environ 1 100 euros).
                - listitem [ref=e119]: "Le critère qui départage ces modèles reste l’épaisseur de l’acier de cuisson et la polyvalence : sur ces deux points, le COEO TRIO se distingue avec sa plancha de 10 mm et son système trois usages autour d’un même foyer."
            - paragraph [ref=e120]: "Choisir un brasero en 2026, c’est arbitrer entre le plaisir du feu et la cuisine en extérieur. Les braseros plancha de cuisson ont changé la donne : autour d’un foyer ouvert, on saisit à la plancha, on grille, on mijote et on profite des flammes lors des soirées au jardin ou sur la terrasse. Ce guide d’achat passe en revue sept braseros et marques disponibles en France, classés selon des critères constants, pour vous aider à trouver celui qui correspond à votre espace et à votre façon de recevoir."
            - heading "Tableau comparatif des 7 meilleurs braseros en 2026" [level=2] [ref=e121]
            - paragraph [ref=e122]: "Le classement ci-dessous repose sur cinq critères pondérés de façon identique pour chaque modèle : épaisseur et type d’acier, polyvalence des modes de cuisson, diamètre de la surface, rapport qualité-prix et durabilité (garantie, tenue dehors)."
